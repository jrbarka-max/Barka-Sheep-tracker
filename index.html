<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>

        .header-flex { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:1rem; }

        .tab { padding:.5rem .9rem; font-size:.875rem; font-weight:500; display:flex; align-items:center; gap:.4rem; border:none; border-bottom:2px solid transparent; background:none; cursor:pointer; color:#6b7280; white-space:nowrap; transition:all .15s; }

        .tab.active { border-bottom-color:#16a34a; color:#15803d; }

        .eid-bar { background:#f0fdf4; border:2px solid #16a34a; border-radius:.5rem; padding:.875rem 1.125rem; margin-bottom:1.25rem; }

        .eid-input { flex:1; min-width:150px; padding:.45rem .7rem; border:1px solid #d1d5db; border-radius:.375rem; font-size:1rem; font-family:monospace; }

        .eid-hint { font-size:.7rem; color:#6b7280; margin-top:.4rem; }
        .eid-result { margin-top:.875rem; padding:.875rem; background:white; border:1px solid #bbf7d0; border-radius:.375rem; }
        .eid-result.not-found { border-color:#fde68a; background:#fffbeb; }
        .eid-result-head { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.5rem; margin-bottom:.6rem; }
        .eid-tag { font-size:1.1rem; font-weight:700; font-family:monospace; color:#065f46; }
        .eid-tag-alt { font-size:.75rem; color:#6b7280; font-family:monospace; }
        .eid-actions { display:flex; gap:.4rem; flex-wrap:wrap; }
        .eid-detail { display:flex; gap:1rem; flex-wrap:wrap; font-size:.8rem; color:#374151; }

        .eid-section-label.red { color:#b91c1c; }
        .eid-section-label.purple { color:#6d28d9; }

        .stat-val { font-size:1.4rem; font-weight:bold; }
        .stat-val.green{color:#15803d;} .stat-val.blue{color:#1e40af;} .stat-val.pink{color:#be185d;} .stat-val.amber{color:#b45309;} .stat-val.red{color:#b91c1c;} .stat-val.gray{color:#374151;}
        .stat-label { font-size:.8rem; color:#4b5563; margin-top:2px; }

        .btn-cloud{background:#8b5cf6;color:white;} .btn-cloud:hover{background:#7c3aed;}
        .btn-amber{background:#f59e0b;color:white;} .btn-amber:hover{background:#d97706;}
        .btn-red{background:#dc2626;color:white;} .btn-red:hover{background:#b91c1c;}
        .btn-gray{background:#6b7280;color:white;} .btn-gray:hover{background:#4b5563;}
        .btn-outline{background:none;border:1px solid #d1d5db;color:#374151;} .btn-outline:hover{background:#f9fafb;}
        .btn-sm{padding:.3rem .8rem;font-size:.8125rem;}
        .btn-icon{padding:.4rem;border:none;background:none;cursor:pointer;color:#dc2626;transition:color .15s;}
        .btn-icon:hover{color:#991b1b;}
        .btn-icon.amber{color:#d97706;} .btn-icon.amber:hover{color:#b45309;}
        .btn-icon.blue{color:#2563eb;} .btn-icon.blue:hover{color:#1d4ed8;}
        .btn-icon.green{color:#16a34a;} .btn-icon.green:hover{color:#15803d;}

        td { padding:.6rem .875rem; border-bottom:1px solid #f3f4f6; font-size:.8125rem; color:#111827; }

        .empty { text-align:center; padding:2.5rem 0; color:#6b7280; font-size:.875rem; }

        .badge.active{background:#dcfce7;color:#15803d;} .badge.complete{background:#f3f4f6;color:#6b7280;}
        .badge.cidr{background:#fef3c7;color:#92400e;}

        .search-wrap { position:relative; }
        .search-ico { position:absolute; left:.65rem; top:50%; transform:translateY(-50%); color:#9ca3af; pointer-events:none; }
        .search-input { padding:.4rem .875rem .4rem 2.1rem; border:1px solid #d1d5db; border-radius:.375rem; font-size:.875rem; background:white; color:#111827; }

        .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:200; padding:1rem; }
        .modal { background:white; border-radius:.5rem; box-shadow:0 20px 40px rgba(0,0,0,.2); padding:1.5rem; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; }
        .modal-title { font-size:1.0625rem; font-weight:600; color:#1f2937; margin-bottom:1rem; display:flex; align-items:center; gap:.5rem; }
        .modal-footer { display:flex; gap:.75rem; justify-content:flex-end; margin-top:1rem; padding-top:.75rem; border-top:1px solid #f3f4f6; }

        /* Alerts */
        .alert { padding:.75rem 1rem; border-radius:.375rem; margin-bottom:.875rem; display:flex; align-items:flex-start; gap:.65rem; font-size:.875rem; }
        .alert.success{background:#dcfce7;border:1px solid #86efac;color:#166534;}
        .alert.error{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;}
        .alert.warning{background:#fef3c7;border:1px solid #fde047;color:#854d0e;}
        .alert.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}

        .sale-summary { display:grid; grid-template-columns:repeat(2,1fr); gap:.75rem; margin-bottom:1rem; }
        @media(min-width:540px){.sale-summary{grid-template-columns:repeat(3,1fr);}}
        .sale-stat { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:.5rem; padding:.75rem; text-align:center; }
        .sale-stat-val { font-size:1.25rem; font-weight:700; color:#15803d; }
        .sale-stat-label { font-size:.7rem; color:#4b5563; margin-top:2px; }
        .sale-stat.highlight { background:#fffbeb; border-color:#fde68a; }
        .sale-stat.highlight .sale-stat-val { color:#b45309; }
        .animal-pick-row { display:flex; align-items:center; padding:6px 10px; border-bottom:1px solid #f3f4f6; gap:8px; cursor:pointer; }
        .animal-pick-row:hover { background:#f0fdf4; }
        .animal-pick-row:last-child { border-bottom:none; }
        .animal-pick-row input[type=checkbox] { width:16px; height:16px; accent-color:#16a34a; flex-shrink:0; cursor:pointer; }
        .group-animal-chip { display:inline-flex; align-items:center; gap:4px; background:#f0fdf4; border:1px solid #86efac; border-radius:.375rem; padding:3px 8px; font-size:.8rem; font-family:monospace; }
        .group-animal-chip button { background:none; border:none; cursor:pointer; color:#dc2626; font-size:.9rem; line-height:1; padding:0 0 0 2px; }
        .price-calc { background:#f9fafb; border:1px solid #e5e7eb; border-radius:.5rem; padding:1rem; margin-top:.75rem; }
        .price-calc-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
        .saved-group-card { border:1px solid #e5e7eb; border-radius:.5rem; margin-bottom:.75rem; overflow:hidden; }
        .saved-group-header { background:#f9fafb; padding:.75rem 1rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:.5rem; cursor:pointer; }
        .saved-group-header:hover { background:#f0fdf4; }
        .saved-group-body { padding:.875rem 1rem; border-top:1px solid #e5e7eb; }
        .saved-group-stats { display:flex; gap:1.5rem; flex-wrap:wrap; font-size:.8rem; color:#374151; margin-bottom:.75rem; }
        .saved-group-stats span { color:#6b7280; }

        /* Breeding */
        .breeding-card { border:1px solid #e5e7eb; border-radius:.5rem; margin-bottom:.75rem; overflow:hidden; }
        .breeding-card-head { background:#f9fafb; padding:.75rem 1rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:.5rem; cursor:pointer; }
        .breeding-card-head:hover { background:#f0fdf4; }
        .breeding-card-body { padding:.875rem 1rem; border-top:1px solid #e5e7eb; }
        .cidr-card { border:1px solid #fde68a; border-radius:.5rem; padding:.875rem; margin-bottom:.75rem; background:#fffbeb; }

        .loading { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(to bottom right,#f0fdf4,#d1fae5); }
        .loading-text { color:#15803d; font-size:1.125rem; }
        .truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px; }
        .mono { font-family:monospace; }
        .retag-trail { font-size:.7rem; color:#6b7280; font-family:monospace; }
    </style>
</head>

// ── Re-tag Modal ───────────────────────────────────────
function RetagModal({ tag, lambs, onClose, onSave }) {
  const preselect = tag ? lambs.find(l=>String(l.tagNumber).toLowerCase()===String(tag).toLowerCase()) : null;
  const [step, setStep] = useState(preselect?2:1);
  const [browseSearch, setBrowseSearch] = useState(tag||'');
  const [selected, setSelected] = useState(preselect||null);
  const [newTag, setNewTag] = useState('');
  const [newTag2, setNewTag2] = useState('');
  const [reason, setReason] = useState('');
  const [saving, setSaving] = useState(false);

  const filtered = lambs.filter(l=>{
    if(!browseSearch.trim()) return true;
    const s=browseSearch.toLowerCase();
    return String(l.tagNumber).toLowerCase().includes(s)||String(l.tag2||'').toLowerCase().includes(s)||String(l.eweNumber||'').toLowerCase().includes(s)||String(l.sex||'').toLowerCase().includes(s);
  });

  const pickAnimal = a => { setSelected(a); setNewTag2(a.tag2||''); setStep(2); };

  const save = async () => {
    if(!newTag.trim()){alert('New primary tag number required');return;}
    if(lambs.find(l=>String(l.tagNumber).toLowerCase()===newTag.toLowerCase()&&l.id!==selected?.id)){alert('That tag number is already in use');return;}
    setSaving(true);
    await onSave({ oldTag:selected?.tagNumber||tag, newTag:newTag.trim(), newTag2:newTag2.trim(), reason, animalId:selected?.id });
    setSaving(false); onClose();
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:600}}>
        <div className="modal-title"><TagIco/> Re-tag Animal</div>
        <div style={{display:'flex',gap:8,marginBottom:'1rem'}}>
          {['1. Find animal','2. Apply new tag'].map((s,i)=>(
            <div key={i} style={{flex:1,padding:'6px 10px',borderRadius:6,fontSize:'.8rem',fontWeight:500,textAlign:'center',background:step===i+1?'#16a34a':step>i+1?'#dcfce7':'#f3f4f6',color:step===i+1?'white':step>i+1?'#15803d':'#6b7280',border:step>i+1?'1px solid #86efac':'1px solid transparent',cursor:step>i+1?'pointer':'default'}} onClick={()=>step>i+1&&setStep(i+1)}>{step>i+1?'✓ ':''}{s}</div>
          ))}
        </div>
        {step===1 && (
          <>
            <div className="search-wrap" style={{marginBottom:'.5rem'}}>
              <div className="search-ico"><SearchIco/></div>
              <input className="search-input" style={{width:'100%',paddingLeft:'2rem'}} value={browseSearch} onChange={e=>setBrowseSearch(e.target.value)} placeholder="Search tag #, ewe #, sex..." autoFocus autoComplete="off"/>
            </div>
            <div style={{maxHeight:300,overflowY:'auto',border:'1px solid #e5e7eb',borderRadius:6}}>
              {filtered.length===0?<div className="empty" style={{padding:'1.5rem'}}>No animals match.</div>:(
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead><tr style={{background:'#f9fafb',position:'sticky',top:0}}>
                    <th style={{padding:'6px 10px',fontSize:'.75rem',fontWeight:500,color:'#374151',textAlign:'left'}}>Tag #</th>
                    <th style={{padding:'6px 10px',fontSize:'.75rem',fontWeight:500,color:'#374151',textAlign:'left'}}>Alt</th>
                    <th style={{padding:'6px 10px',fontSize:'.75rem',fontWeight:500,color:'#374151',textAlign:'left'}}>Sex</th>
                    <th style={{padding:'6px 10px',fontSize:'.75rem',fontWeight:500,color:'#374151',textAlign:'left'}}>Born</th>
                    <th style={{padding:'6px 10px',fontSize:'.75rem',fontWeight:500,color:'#374151',textAlign:'left'}}>Ewe</th>
                    <th></th>
                  </tr></thead>
                  <tbody>
                    {filtered.map(l=>(
                      <tr key={l.id} style={{borderBottom:'1px solid #f3f4f6',cursor:'pointer'}} onClick={()=>pickAnimal(l)} onMouseEnter={e=>e.currentTarget.style.background='#f0fdf4'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                        <td style={{padding:'7px 10px',fontFamily:'monospace',fontWeight:600,fontSize:'.85rem'}}>{l.tagNumber}</td>
                        <td style={{padding:'7px 10px',fontFamily:'monospace',fontSize:'.8rem',color:'#6b7280'}}>{l.tag2||'—'}</td>
                        <td style={{padding:'7px 10px',fontSize:'.8rem'}}><span className={`badge ${l.sex==='male'||l.sex==='ram'?'male':'female'}`}>{l.sex}</span></td>
                        <td style={{padding:'7px 10px',fontSize:'.8rem'}}>{fmtDate(l.birthDate)}</td>
                        <td style={{padding:'7px 10px',fontFamily:'monospace',fontSize:'.8rem'}}>{l.eweNumber}</td>
                        <td style={{padding:'7px 10px'}}><button className="btn btn-primary btn-sm" onClick={e=>{e.stopPropagation();pickAnimal(l);}}>Select</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </>
        )}
        {step===2 && selected && (
          <>
            <div className="alert info" style={{marginBottom:'1rem'}}>
              <div>Selected: Tag <strong className="mono">{selected.tagNumber}</strong>{selected.tag2&&<> · Alt <span className="mono">{selected.tag2}</span></>}{selected.sex&&<> · {selected.sex}</>}{selected.birthDate&&<> · born {fmtDate(selected.birthDate)}</>}</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.75rem'}}>
              <div className="form-group">
                <label className="form-label">New primary tag # *</label>
                <input className="form-input mono" value={newTag} onChange={e=>setNewTag(e.target.value)} placeholder="Scan or type new EID" autoFocus autoComplete="off"/>
                <p className="form-hint">All records move to this number</p>
              </div>
              <div className="form-group">
                <label className="form-label">Second / backup tag #</label>
                <input className="form-input mono" value={newTag2} onChange={e=>setNewTag2(e.target.value)} placeholder="Optional 2nd tag" autoComplete="off"/>
              </div>
              <div className="form-group" style={{gridColumn:'span 2'}}>
                <label className="form-label">Reason</label>
                <input className="form-input" value={reason} onChange={e=>setReason(e.target.value)} placeholder="e.g., lost tag, damaged, new EID..."/>
              </div>
            </div>
          </>
        )}
        <div className="modal-footer">
          <button className="btn btn-outline" onClick={onClose}>Cancel</button>
          {step===2&&<button className="btn btn-outline" onClick={()=>setStep(1)}>← Back</button>}
          {step===2&&<button className="btn btn-primary" onClick={save} disabled={saving}><TagIco/> {saving?'Saving...':'Apply Re-tag'}</button>}
        </div>
      </div>
    </div>
  );
}

// ── CIDR Event Modal ───────────────────────────────────

    const g = breedingGroups.find(x=>x.id===gid);

  };

  const eweLambs = lambs.filter(l=>l.sex==='female'||l.sex==='ewe');

    if(!browseSearch.trim()) return true;
    const s=browseSearch.toLowerCase();
    return String(l.tagNumber).toLowerCase().includes(s)||String(l.tag2||'').toLowerCase().includes(s);
  });

  const save = async () => {

}

// ── EID Scanner Bar ────────────────────────────────────
function EIDBar({ lambs, disposals, medEvents, onPrefill, onMedModal, onRetagModal }) {
  const [val, setVal] = useState('');
  const [result, setResult] = useState(null);
  const inputRef = useRef(null);
  const timer = useRef(null);

  const lookup = useCallback((raw) => {
    const tag = (raw||val).trim();
    if(!tag) return;
    const tl = tag.toLowerCase();
    const lamb = lambs.find(l=>String(l.tagNumber).toLowerCase()===tl||String(l.tag2||'').toLowerCase()===tl);
    const eweLambs = lambs.filter(l=>String(l.eweNumber).toLowerCase()===tl);
    const disp = disposals.find(d=>String(d.tagNumber).toLowerCase()===tl);
    const meds = medEvents.filter(m=>String(m.tagNumber).toLowerCase()===tl);
    setResult({ tag, lamb, eweLambs, disp, meds, found:!!(lamb||eweLambs.length||disp||meds.length) });
  }, [lambs, disposals, medEvents]);

  const handleChange = v => {
    setVal(v);
    clearTimeout(timer.current);
    if(v.trim().length>=3) timer.current=setTimeout(()=>lookup(v.trim()),380);
    else setResult(null);
  };

  const clear = () => { setVal(''); setResult(null); inputRef.current?.focus(); };

  return (
    <div className="eid-bar">
      <div className="eid-top">
        <ScanIco/><span className="eid-label">EID / Tag Lookup</span>
        <input ref={inputRef} className="eid-input" value={val} placeholder="Scan EID or type tag number..."
          onChange={e=>handleChange(e.target.value)} onKeyDown={e=>e.key==='Enter'&&lookup(val.trim())} autoComplete="off"/>
        <button className="btn btn-primary btn-sm" onClick={()=>lookup(val.trim())}>Look up</button>
        {val&&<button className="btn btn-outline btn-sm" onClick={clear}>Clear</button>}
      </div>
      <div className="eid-hint">Bluetooth RFID readers act as keyboards — focus this field and scan</div>

      {result&&(
        <div className={`eid-result ${!result.found?'not-found':''}`}>
          {result.found?(
            <>
              <div className="eid-result-head">
                <div>
                  <div className="eid-tag">Tag: {result.tag}</div>
                  {result.lamb?.tag2&&<div className="eid-tag-alt">Alt: {result.lamb.tag2}</div>}
                </div>
                <div className="eid-actions">
                  <button className="btn btn-primary btn-sm" onClick={()=>{onPrefill('birth',result.tag);clear();}}><Plus/> Birth</button>
                  <button className="btn btn-amber btn-sm" onClick={()=>onMedModal(result.tag)}><SyringeIco/> Med</button>
                  <button className="btn btn-blue btn-sm" onClick={()=>{onPrefill('disposal',result.tag);clear();}}>Sale/Death</button>
                  <button className="btn btn-gray btn-sm" onClick={()=>onRetagModal(result.tag)}><TagIco/> Re-tag</button>
                </div>
              </div>
              {result.lamb&&(
                <>
                  <div className="eid-section-label green">Lamb record</div>
                  <div className="eid-detail">
                    <div><span>Born: </span>{fmtDate(result.lamb.birthDate)}</div>
                    <div><span>Sex: </span><span className={`badge ${result.lamb.sex}`}>{result.lamb.sex}</span></div>
                    <div><span>Wt: </span>{result.lamb.birthWeight} lbs</div>
                    <div><span>Dam: </span><span className="mono">{result.lamb.eweNumber}</span></div>
                    <div><span>Born as: </span>{result.lamb.numberBorn}</div>
                    {result.lamb.complications&&<div><span>Compl: </span>{result.lamb.complications}</div>}
                  </div>
                </>
              )}
              {result.eweLambs?.length>0&&(
                <>
                  <div className="eid-section-label blue">Ewe {result.tag} — {result.eweLambs.length} lambs</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                    {result.eweLambs.map(l=><span key={l.id} className="lamb-chip">{l.tagNumber} · {l.sex} · {l.numberBorn} · {l.birthWeight}lbs</span>)}
                  </div>
                </>
              )}
              {result.disp&&(
                <>
                  <div className="eid-section-label red">Disposal</div>
                  <div className="eid-detail">
                    <div><span>Date: </span>{fmtDate(result.disp.date)}</div>
                    <div><span className={`badge ${result.disp.type==='died'?'died':'sold'}`}>{result.disp.whatHappened||result.disp.type}</span></div>
                    {result.disp.buyer&&<div><span>Buyer: </span>{result.disp.buyer}</div>}
                    {result.disp.cause&&<div><span>Cause: </span>{result.disp.cause}</div>}
                  </div>
                </>
              )}
              {result.meds?.length>0&&(
                <>
                  <div className="eid-section-label purple">Medical ({result.meds.length})</div>
                  {[...result.meds].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4).map(m=>(
                    <div key={m.id} className="eid-hist-row"><span><strong>{m.product}</strong> {m.dosage&&`${m.dosage} ${m.unit||''}`} {m.comment&&`· ${m.comment}`}</span><span style={{color:'#9ca3af',whiteSpace:'nowrap'}}>{m.date}</span></div>
                  ))}
                </>
              )}
            </>
          ):(
            <>
              <div className="eid-result-head">
                <div style={{fontWeight:600,color:'#92400e'}}>Tag <span className="mono">{result.tag}</span> not found</div>
                <div className="eid-actions">
                  <button className="btn btn-primary btn-sm" onClick={()=>{onPrefill('birth',result.tag);clear();}}><Plus/> Register lamb</button>
                  <button className="btn btn-amber btn-sm" onClick={()=>onMedModal(result.tag)}><SyringeIco/> Add med</button>
                </div>
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ── Sale Group Tab ─────────────────────────────────────
function SaleGroupTab({ lambs, saleGroups, onSave, onDelete }) {
  const [groupName, setGroupName] = useState('');
  const [saleDate, setSaleDate]   = useState(today());
  const [buyer, setBuyer]         = useState('');
  const [venue, setVenue]         = useState('sale barn');
  const [animals, setAnimals]     = useState([]);
  const [scanVal, setScanVal]     = useState('');
  const [browseSearch, setBrowseSearch] = useState('');
  const [showBrowse, setShowBrowse] = useState(false);
  const [weightMode, setWeightMode] = useState('total');
  const [totalWeight, setTotalWeight] = useState('');
  const [pricePerLb, setPricePerLb] = useState('');
  const [totalPrice, setTotalPrice] = useState('');
  const [comments, setComments]   = useState('');
  const [expandedGroup, setExpandedGroup] = useState(null);
  const [saving, setSaving]       = useState(false);
  const scanRef = useRef(null);

  const totalWt = weightMode==='total'?(parseFloat(totalWeight)||0):animals.reduce((s,a)=>s+(parseFloat(a.saleWeight)||parseFloat(a.birthWeight)||0),0);
  const avgWt   = animals.length?(totalWt/animals.length):0;
  const totPrc  = parseFloat(totalPrice)||0;
  const pplb    = parseFloat(pricePerLb)||0;
  const avgPrc  = animals.length?totPrc/animals.length:0;

  const handlePPLB = v => { setPricePerLb(v); if(totalWt>0&&v) setTotalPrice((parseFloat(v)*totalWt).toFixed(2)); };
  const handleTotP = v => { setTotalPrice(v); if(totalWt>0&&v) setPricePerLb((parseFloat(v)/totalWt).toFixed(4)); };
  useEffect(()=>{ if(pricePerLb&&totalWt>0) setTotalPrice((parseFloat(pricePerLb)*totalWt).toFixed(2)); },[totalWt]);

  const addByTag = () => {
    const tag=scanVal.trim(); if(!tag) return;
    if(animals.find(a=>String(a.tagNumber).toLowerCase()===tag.toLowerCase())){alert('Already in group');setScanVal('');return;}
    const lamb=lambs.find(l=>String(l.tagNumber).toLowerCase()===tag.toLowerCase()||String(l.tag2||'').toLowerCase()===tag.toLowerCase());
    if(lamb) setAnimals(p=>[...p,{...lamb,saleWeight:''}]);
    else if(confirm('Tag '+tag+' not in records. Add anyway?')) setAnimals(p=>[...p,{id:'unk-'+Date.now(),tagNumber:tag,tag2:'',sex:'',birthWeight:'',saleWeight:''}]);
    setScanVal(''); scanRef.current?.focus();
  };

  const toggle = a => { if(animals.find(x=>x.id===a.id)) setAnimals(p=>p.filter(x=>x.id!==a.id)); else setAnimals(p=>[...p,{...a,saleWeight:''}]); };

  const saveGroup = async () => {
    if(!groupName.trim()){alert('Group name required');return;}
    if(!animals.length){alert('Add at least one animal');return;}
    setSaving(true);
    const g = { id:uid(), name:groupName, saleDate, buyer, venue, animals:animals.map(a=>({id:a.id,tagNumber:a.tagNumber,tag2:a.tag2,sex:a.sex,birthWeight:a.birthWeight,saleWeight:a.saleWeight})), weightMode, totalWeight:totalWt, avgWeight:avgWt, pricePerLb:pplb, totalPrice:totPrc, avgPrice:avgPrc, comments, recorded:new Date().toISOString() };
    await onSave(g);
    setSaving(false);
    setGroupName(''); setAnimals([]); setTotalWeight(''); setPricePerLb(''); setTotalPrice(''); setComments('');
  };

  const fmt = n=>isNaN(n)||n===0?'—':'$'+n.toFixed(2);
  const fmtW = n=>isNaN(n)||n===0?'—':n.toFixed(1)+' lbs';

  const browsable = lambs.filter(l=>{ if(!browseSearch.trim()) return true; const s=browseSearch.toLowerCase(); return String(l.tagNumber).toLowerCase().includes(s)||String(l.tag2||'').toLowerCase().includes(s)||String(l.sex||'').toLowerCase().includes(s); });

  return (
    <>
      <div className="card">
        <div className="section-head">🐑 Build Sale Group</div>
        <div className="form-grid" style={{marginBottom:'1rem'}}>
          <div className="form-group"><label className="form-label">Group name *</label><input className="form-input" value={groupName} onChange={e=>setGroupName(e.target.value)} placeholder="e.g., Spring lambs lot 1"/></div>
          <div className="form-group"><label className="form-label">Sale date</label><input type="date" className="form-input" value={saleDate} onChange={e=>setSaleDate(e.target.value)}/></div>
          <div className="form-group"><label className="form-label">Venue</label><select className="form-select" value={venue} onChange={e=>setVenue(e.target.value)}><option value="sale barn">Sale barn</option><option value="private sale">Private sale</option><option value="other">Other</option></select></div>
          <div className="form-group col3"><label className="form-label">Buyer</label><input className="form-input" value={buyer} onChange={e=>setBuyer(e.target.value)} placeholder="Buyer name or market"/></div>
        </div>

        <div style={{borderTop:'1px solid #f3f4f6',paddingTop:'1rem',marginBottom:'1rem'}}>
          <div style={{fontWeight:600,fontSize:'.875rem',color:'#1f2937',marginBottom:'.5rem'}}>Add animals</div>
          <div style={{display:'flex',gap:'.5rem',marginBottom:'.75rem',flexWrap:'wrap'}}>
            <input ref={scanRef} className="form-input mono" style={{flex:1,minWidth:150}} value={scanVal} onChange={e=>setScanVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addByTag()} placeholder="Scan EID or type tag # + Enter" autoComplete="off"/>
            <button className="btn btn-primary btn-sm" onClick={addByTag}>+ Add</button>
            <button className={`btn btn-sm ${showBrowse?'btn-gray':'btn-outline'}`} onClick={()=>setShowBrowse(s=>!s)}>{showBrowse?'Hide':'Browse'} list</button>
          </div>
          {showBrowse&&(
            <div style={{border:'1px solid #e5e7eb',borderRadius:'.375rem',marginBottom:'.75rem',overflow:'hidden'}}>
              <div style={{padding:'.5rem .75rem',background:'#f9fafb',borderBottom:'1px solid #e5e7eb'}}>
                <input className="search-input" style={{width:'100%'}} value={browseSearch} onChange={e=>setBrowseSearch(e.target.value)} placeholder="Filter animals..."/>
              </div>
              <div style={{maxHeight:200,overflowY:'auto'}}>
                {browsable.map(l=>{
                  const inG=!!animals.find(a=>a.id===l.id);
                  return (<div key={l.id} className="animal-pick-row" onClick={()=>toggle(l)}>
                    <input type="checkbox" checked={inG} onChange={()=>toggle(l)} onClick={e=>e.stopPropagation()}/>
                    <span className="mono" style={{fontWeight:600,minWidth:70}}>{l.tagNumber}</span>
                    {l.tag2&&<span className="mono" style={{color:'#6b7280',fontSize:'.75rem'}}>{l.tag2}</span>}
                    <span className={`badge ${l.sex==='male'||l.sex==='ram'?'male':'female'}`}>{l.sex}</span>
                    <span style={{fontSize:'.8rem',color:'#4b5563'}}>{l.birthWeight?l.birthWeight+' lbs birth':''}</span>
                  </div>);
                })}
              </div>
            </div>
          )}
          {animals.length>0&&(
            <>
              <div style={{fontSize:'.75rem',fontWeight:600,color:'#6b7280',marginBottom:'.4rem'}}>GROUP ({animals.length} animals)</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:'.75rem'}}>
                {animals.map(a=><span key={a.id} className="group-animal-chip">{a.tagNumber}<button onClick={()=>setAnimals(p=>p.filter(x=>x.id!==a.id))}>×</button></span>)}
              </div>
              {weightMode==='individual'&&(
                <div style={{border:'1px solid #e5e7eb',borderRadius:'.375rem',overflow:'hidden',marginBottom:'.5rem'}}>
                  <div style={{background:'#f9fafb',padding:'6px 10px',fontSize:'.75rem',fontWeight:600,color:'#374151',borderBottom:'1px solid #e5e7eb'}}>Sale weights per animal (lbs)</div>
                  {animals.map(a=>(
                    <div key={a.id} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 10px',borderBottom:'1px solid #f3f4f6'}}>
                      <span className="mono" style={{minWidth:80,fontWeight:500}}>{a.tagNumber}</span>
                      <span style={{fontSize:'.75rem',color:'#9ca3af',flex:1}}>birth: {a.birthWeight||'?'} lbs</span>
                      <input type="number" step="0.1" className="form-input" style={{width:90}} value={a.saleWeight} onChange={e=>setAnimals(p=>p.map(x=>x.id===a.id?{...x,saleWeight:e.target.value}:x))} placeholder="lbs"/>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
        </div>

        <div style={{borderTop:'1px solid #f3f4f6',paddingTop:'1rem'}}>
          <div style={{fontWeight:600,fontSize:'.875rem',color:'#1f2937',marginBottom:'.75rem'}}>Weight & Price</div>
          <div style={{display:'flex',gap:'.5rem',marginBottom:'.875rem',flexWrap:'wrap'}}>
            <label style={{fontSize:'.8rem',fontWeight:500,color:'#374151',alignSelf:'center'}}>Weight:</label>
            {['total','individual'].map(m=><button key={m} className={`btn btn-sm ${weightMode===m?'btn-primary':'btn-outline'}`} onClick={()=>setWeightMode(m)}>{m==='total'?'Total group':'Per animal'}</button>)}
          </div>
          <div className="price-calc">
            <div className="price-calc-grid">
              {weightMode==='total'?(
                <div className="form-group"><label className="form-label">Total group weight (lbs)</label><input type="number" step="0.1" className="form-input" value={totalWeight} onChange={e=>{setTotalWeight(e.target.value);if(pricePerLb&&e.target.value)setTotalPrice((parseFloat(pricePerLb)*parseFloat(e.target.value)).toFixed(2));}} placeholder="e.g., 420"/></div>
              ):(
                <div className="form-group"><label className="form-label">Total weight (auto)</label><input className="form-input" value={totalWt>0?totalWt.toFixed(1):''} readOnly style={{background:'#f9fafb',color:'#6b7280'}}/></div>
              )}
              <div className="form-group"><label className="form-label">Avg weight / animal</label><input className="form-input" value={avgWt>0?avgWt.toFixed(1)+' lbs':''} readOnly style={{background:'#f9fafb',color:'#6b7280'}}/></div>
              <div className="form-group"><label className="form-label">Price per lb ($/lb)</label><input type="number" step="0.0001" className="form-input" value={pricePerLb} onChange={e=>handlePPLB(e.target.value)} placeholder="e.g., 1.85"/></div>
              <div className="form-group"><label className="form-label">Total sale price ($)</label><input type="number" step="0.01" className="form-input" value={totalPrice} onChange={e=>handleTotP(e.target.value)} placeholder="e.g., 1200.00"/></div>
            </div>
            {(totalWt>0||totPrc>0)&&(
              <div className="sale-summary" style={{marginTop:'.875rem',marginBottom:0}}>
                <div className="sale-stat"><div className="sale-stat-val">{animals.length}</div><div className="sale-stat-label">Head</div></div>
                <div className="sale-stat"><div className="sale-stat-val">{fmtW(totalWt)}</div><div className="sale-stat-label">Total wt</div></div>
                <div className="sale-stat"><div className="sale-stat-val">{fmtW(avgWt)}</div><div className="sale-stat-label">Avg wt/head</div></div>
                <div className="sale-stat highlight"><div className="sale-stat-val">{fmt(totPrc)}</div><div className="sale-stat-label">Total sale</div></div>
                <div className="sale-stat highlight"><div className="sale-stat-val">{pplb>0?'$'+pplb.toFixed(4)+'/lb':'—'}</div><div className="sale-stat-label">$/lb</div></div>
                <div className="sale-stat highlight"><div className="sale-stat-val">{fmt(avgPrc)}</div><div className="sale-stat-label">Avg $/head</div></div>
              </div>
            )}
          </div>
          <div className="form-group" style={{marginTop:'.75rem'}}><label className="form-label">Comments</label><textarea className="form-textarea" rows="2" value={comments} onChange={e=>setComments(e.target.value)}/></div>
          <div style={{display:'flex',gap:'.75rem',marginTop:'.875rem',flexWrap:'wrap'}}>
            <button className="btn btn-primary" onClick={saveGroup} disabled={saving}>💾 {saving?'Saving...':'Save Sale Group'}</button>
            <button className="btn btn-outline" onClick={()=>{setGroupName('');setAnimals([]);setTotalWeight('');setPricePerLb('');setTotalPrice('');setComments('');}}>Clear</button>
          </div>
        </div>
      </div>

      <div className="card">
        <div style={{fontWeight:600,color:'#1f2937',marginBottom:'.875rem'}}>Saved Sale Groups ({saleGroups.length})</div>
        {saleGroups.length===0?<div className="empty">No sale groups yet.</div>:(
          [...saleGroups].sort((a,b)=>b.saleDate.localeCompare(a.saleDate)).map(g=>(
            <div key={g.id} className="saved-group-card">
              <div className="saved-group-header" onClick={()=>setExpandedGroup(expandedGroup===g.id?null:g.id)}>
                <div><div style={{fontWeight:600}}>{g.name}</div><div style={{fontSize:'.8rem',color:'#6b7280'}}>{fmtDate(g.saleDate)} · {g.venue}{g.buyer?' · '+g.buyer:''}</div></div>
                <div style={{display:'flex',gap:'1rem',alignItems:'center'}}>
                  <div style={{textAlign:'right'}}><div style={{fontWeight:700,color:'#15803d'}}>{g.totalPrice>0?'$'+g.totalPrice.toFixed(2):'—'}</div><div style={{fontSize:'.75rem',color:'#6b7280'}}>{g.animals.length} head{g.totalWeight>0?' · '+g.totalWeight.toFixed(1)+' lbs':''}</div></div>
                  <div style={{display:'flex',gap:4}}>
                    <button className="btn-icon" onClick={e=>{e.stopPropagation();if(confirm('Delete?'))onDelete(g.id);}}><Trash/></button>
                    <span style={{fontSize:'.75rem',color:'#9ca3af'}}>{expandedGroup===g.id?'▲':'▼'}</span>
                  </div>
                </div>
              </div>
              {expandedGroup===g.id&&(
                <div className="saved-group-body">
                  <div className="saved-group-stats">
                    <div><span>Head: </span><strong>{g.animals.length}</strong></div>
                    <div><span>Total wt: </span><strong>{g.totalWeight>0?g.totalWeight.toFixed(1)+' lbs':'—'}</strong></div>
                    <div><span>Avg wt: </span><strong>{g.avgWeight>0?g.avgWeight.toFixed(1)+' lbs':'—'}</strong></div>
                    <div><span>$/lb: </span><strong>{g.pricePerLb>0?'$'+g.pricePerLb.toFixed(4):'—'}</strong></div>
                    <div><span>Total: </span><strong>{g.totalPrice>0?'$'+g.totalPrice.toFixed(2):'—'}</strong></div>
                    <div><span>Avg $/head: </span><strong>{g.avgPrice>0?'$'+g.avgPrice.toFixed(2):'—'}</strong></div>
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:'.5rem'}}>
                    {g.animals.map(a=><span key={a.id} className="group-animal-chip" style={{cursor:'default'}}>{a.tagNumber}{a.saleWeight?<span style={{color:'#15803d',marginLeft:3}}>{a.saleWeight}lbs</span>:''}</span>)}
                  </div>
                  {g.comments&&<div style={{fontSize:'.8rem',color:'#6b7280'}}>{g.comments}</div>}
                </div>
              )}
            </div>
          ))
        )}
      </div>
    </>
  );
}

// ── Breeding Tab ───────────────────────────────────────
function BreedingTab({ lambs, breedingGroups, cidrEvents, onSaveGroup, onDeleteGroup, onSaveCidr, onDeleteCidr }) {
  const [showGroupModal, setShowGroupModal] = useState(false);
  const [showCidrModal, setShowCidrModal]   = useState(false);
  const [editGroup, setEditGroup]           = useState(null);
  const [editCidr, setEditCidr]             = useState(null);
  const [expanded, setExpanded]             = useState(null);

  return (
    <>
      {showGroupModal&&<BreedingGroupModal group={editGroup} lambs={lambs} onClose={()=>{setShowGroupModal(false);setEditGroup(null);}} onSave={async g=>{await onSaveGroup(g);setShowGroupModal(false);setEditGroup(null);}}/>}
      {showCidrModal&&<CidrModal event={editCidr} lambs={lambs} breedingGroups={breedingGroups} onClose={()=>{setShowCidrModal(false);setEditCidr(null);}} onSave={async e=>{await onSaveCidr(e);setShowCidrModal(false);setEditCidr(null);}}/>}

      {/* Breeding Groups */}
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.875rem',flexWrap:'wrap',gap:'.5rem'}}>
          <div className="section-head" style={{margin:0}}><HeartIco/> Breeding Groups</div>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowGroupModal(true)}><Plus/> New group</button>
        </div>

        {breedingGroups.length===0?<div className="empty">No breeding groups yet. Create one to track ram in/out dates and which ewes are in each group.</div>:(
          breedingGroups.map(g=>{
            const isActive = g.ramInDate && (!g.ramOutDate || new Date(g.ramOutDate) >= new Date());
            return (
              <div key={g.id} className="breeding-card">
                <div className="breeding-card-head" onClick={()=>setExpanded(expanded===g.id?null:g.id)}>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontWeight:600}}>{g.name}</span>
                      <span className={`badge ${isActive?'active':'complete'}`}>{isActive?'Active':'Complete'}</span>
                    </div>
                    <div style={{fontSize:'.8rem',color:'#6b7280',marginTop:2}}>
                      {g.ramName&&<span>{g.ramName} </span>}
                      {g.ramBreed&&<span>({g.ramBreed}) </span>}
                      {g.ramTag&&<span className="mono">#{g.ramTag} </span>}
                      · {g.ewes.length} ewes
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <div style={{textAlign:'right',fontSize:'.8rem',color:'#6b7280'}}>
                      {g.ramInDate&&<div>In: {fmtDate(g.ramInDate)}</div>}
                      {g.ramOutDate&&<div>Out: {fmtDate(g.ramOutDate)}</div>}
                    </div>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn-icon blue" title="Edit" onClick={e=>{e.stopPropagation();setEditGroup(g);setShowGroupModal(true);}}><EditIco/></button>
                      <button className="btn-icon" title="Delete" onClick={e=>{e.stopPropagation();if(confirm('Delete this breeding group?'))onDeleteGroup(g.id);}}><Trash/></button>
                      <span style={{fontSize:'.75rem',color:'#9ca3af'}}>{expanded===g.id?'▲':'▼'}</span>
                    </div>
                  </div>
                </div>
                {expanded===g.id&&(
                  <div className="breeding-card-body">
                    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'1rem',marginBottom:'.875rem'}}>
                      <div><div style={{fontSize:'.75rem',color:'#6b7280'}}>Ram</div><div style={{fontWeight:500}}>{g.ramName||'—'} {g.ramBreed?`(${g.ramBreed})`:''}</div>{g.ramTag&&<div className="mono" style={{fontSize:'.8rem'}}>#{g.ramTag}</div>}</div>
                      <div><div style={{fontSize:'.75rem',color:'#6b7280'}}>Dates</div><div style={{fontSize:'.875rem'}}>In: {fmtDate(g.ramInDate)}</div><div style={{fontSize:'.875rem'}}>Out: {g.ramOutDate?fmtDate(g.ramOutDate):'Still in'}</div></div>
                    </div>
                    {g.ewes.length>0&&(
                      <>
                        <div style={{fontSize:'.75rem',color:'#6b7280',marginBottom:'.35rem'}}>Ewes ({g.ewes.length})</div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                          {g.ewes.map(t=><span key={t} className="group-animal-chip" style={{cursor:'default'}}>{t}</span>)}
                        </div>
                      </>
                    )}
                    {g.notes&&<div style={{fontSize:'.8rem',color:'#6b7280',marginTop:'.5rem'}}>{g.notes}</div>}
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>

      {/* CIDR Events */}
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.875rem',flexWrap:'wrap',gap:'.5rem'}}>
          <div className="section-head" style={{margin:0}}>🟡 CIDR Events</div>
          <button className="btn btn-amber btn-sm" onClick={()=>setShowCidrModal(true)}><Plus/> New CIDR event</button>
        </div>

        {cidrEvents.length===0?<div className="empty">No CIDR events recorded yet.</div>:(
          [...cidrEvents].sort((a,b)=>b.dateIn.localeCompare(a.dateIn)).map(e=>{
            const group = breedingGroups.find(g=>g.id===e.breedingGroupId);
            const cidrsOut = !!e.dateOut && new Date(e.dateOut) < new Date();
            return (
              <div key={e.id} className="cidr-card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'.5rem'}}>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                      <span className={`badge ${cidrsOut?'complete':'cidr'}`}>{cidrsOut?'CIDRs out':'CIDRs in'}</span>
                      {group&&<span style={{fontSize:'.8rem',color:'#6b7280'}}>{group.name}</span>}
                    </div>
                    <div style={{fontSize:'.875rem',color:'#374151'}}>
                      <span>In: <strong>{fmtDate(e.dateIn)}</strong></span>
                      {e.dateOut&&<span style={{marginLeft:12}}>Out: <strong>{fmtDate(e.dateOut)}</strong></span>}
                    </div>
                    <div style={{fontSize:'.8rem',color:'#6b7280',marginTop:2}}>{e.ewes.length} ewes</div>
                    {e.notes&&<div style={{fontSize:'.8rem',color:'#6b7280'}}>{e.notes}</div>}
                    {e.ewes.length>0&&(
                      <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:'.4rem'}}>
                        {e.ewes.map(t=><span key={t} className="group-animal-chip" style={{cursor:'default',fontSize:'.75rem'}}>{t}</span>)}
                      </div>
                    )}
                  </div>
                  <div style={{display:'flex',gap:4}}>
                    <button className="btn-icon blue" title="Edit" onClick={()=>{setEditCidr(e);setShowCidrModal(true);}}><EditIco/></button>
                    <button className="btn-icon" title="Delete" onClick={()=>{if(confirm('Delete this CIDR event?'))onDeleteCidr(e.id);}}><Trash/></button>
                  </div>
                </div>
              </div>
            );
          })
        )}
      </div>
    </>
  );
}

            <table>

            <table>

                {[...retagLog].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>(

}

// ── Main App ───────────────────────────────────────────
function App() {
  const [lambs, setLambs]                   = useState([]);
  const [disposals, setDisposals]           = useState([]);
  const [medEvents, setMedEvents]           = useState([]);
  const [feedLogs, setFeedLogs]             = useState([]);
  const [saleGroups, setSaleGroups]         = useState([]);
  const [retagLog, setRetagLog]             = useState([]);
  const [breedingGroups, setBreedingGroups] = useState([]);
  const [cidrEvents, setCidrEvents]         = useState([]);
  const [loading, setLoading]               = useState(true);
  const [loadErr, setLoadErr]               = useState(null);
  const [activeTab, setActiveTab]           = useState('birth');
  const [search, setSearch]                 = useState('');
  const [saveStatus, setSaveStatus]         = useState(''); // message
  const [medModal, setMedModal]             = useState(null);
  const [retagModal, setRetagModal]         = useState(null);
  const [prefillBirth, setPrefillBirth]     = useState('');
  const [prefillDisposal, setPrefillDisposal] = useState('');

  // Birth form
  const emptyBirth = { tagNumber:'', tag2:'', birthDate:today(), sex:'male', birthWeight:'', eweNumber:'', numberBorn:'single', complications:'', comments:'' };
  const [birthForm, setBirth] = useState(emptyBirth);

  // Disposal form
  const emptyDisp = { date:today(), tagNumber:'', whatHappened:'', weight:'', buyer:'', cause:'', comments:'' };
  const [dispForm, setDisp] = useState(emptyDisp);

  // Feed form
  const emptyFeed = { date:today(), who:'Ewes', whatIsIt:'', quantity:'', unit:'Pounds', comments:'' };
  const [feedForm, setFeed] = useState(emptyFeed);

  useEffect(() => { loadAll(); }, []);
  useEffect(() => { if(prefillBirth){setBirth(f=>({...f,tagNumber:prefillBirth}));setPrefillBirth('');} }, [prefillBirth,activeTab]);
  useEffect(() => { if(prefillDisposal){setDisp(f=>({...f,tagNumber:prefillDisposal}));setPrefillDisposal('');} }, [prefillDisposal,activeTab]);

  const loadAll = async () => {
    setLoading(true); setLoadErr(null);
    try {
      const [b,d,m,f,sg,rl,bg,ce] = await Promise.all([
        sb(TABLE.births,'GET',null,'?order=date_added.desc'),
        sb(TABLE.disposals,'GET',null,'?order=date.desc'),
        sb(TABLE.meds,'GET',null,'?order=date.desc'),
        sb(TABLE.feed,'GET',null,'?order=date.desc'),
        sb(TABLE.saleGroups,'GET',null,'?order=sale_date.desc'),
        sb(TABLE.retagLog,'GET',null,'?order=date.desc'),
        sb(TABLE.breedingGroups,'GET',null,'?order=recorded.desc'),
        sb(TABLE.cidrEvents,'GET',null,'?order=date_in.desc'),
      ]);
      setLambs(b.map(fromDb.births));
      setDisposals(d.map(fromDb.disposals));
      setMedEvents(m.map(fromDb.meds));
      setFeedLogs(f.map(fromDb.feed));
      setSaleGroups(sg.map(fromDb.saleGroups));
      setRetagLog(rl.map(fromDb.retagLog));
      setBreedingGroups(bg.map(fromDb.breedingGroups));
      setCidrEvents(ce.map(fromDb.cidrEvents));
    } catch(e) {
      setLoadErr('Failed to load data: '+e.message+'. Check that you have run the SQL setup in Supabase.');
    }
    setLoading(false);
  };

  const flash = msg => { setSaveStatus(msg); setTimeout(()=>setSaveStatus(''),3000); };

  // ── CRUD helpers ──
  const upsert = async (table, dbKey, mapper, item, setter) => {
    await sb(TABLE[table],'POST',[mapper(item)],'');
    setter(prev => { const exists=prev.find(x=>x.id===item.id); return exists?prev.map(x=>x.id===item.id?item:x):[item,...prev]; });
    flash('Saved ✓');
  };
  const del = async (table, id, setter) => {
    await sb(TABLE[table],'DELETE',null,`?id=eq.${id}`);
    setter(prev=>prev.filter(x=>x.id!==id));
    flash('Deleted');
  };

  const saveLamb    = item => upsert('births','births',toDb.births,item,setLambs);
  const saveDisp    = item => upsert('disposals','disposals',toDb.disposals,item,setDisposals);
  const saveMed     = item => upsert('meds','meds',toDb.meds,item,setMedEvents);
  const saveFeedRec = item => upsert('feed','feed',toDb.feed,item,setFeedLogs);
  const saveSaleGrp = item => upsert('saleGroups','saleGroups',toDb.saleGroups,item,setSaleGroups);
  const saveRetag   = item => upsert('retagLog','retagLog',toDb.retagLog,item,setRetagLog);
  const saveBreedGrp = item => upsert('breedingGroups','breedingGroups',toDb.breedingGroups,item,setBreedingGroups);
  const saveCidr    = item => upsert('cidrEvents','cidrEvents',toDb.cidrEvents,item,setCidrEvents);

  const delLamb     = id => del('births',id,setLambs);
  const delDisp     = id => del('disposals',id,setDisposals);
  const delMed      = id => del('meds',id,setMedEvents);
  const delFeed     = id => del('feed',id,setFeedLogs);
  const delSaleGrp  = id => del('saleGroups',id,setSaleGroups);
  const delBreedGrp = id => del('breedingGroups',id,setBreedingGroups);
  const delCidr     = id => del('cidrEvents',id,setCidrEvents);

  // ── Submit handlers ──
  const submitBirth = async e => {
    e.preventDefault();
    if(!birthForm.tagNumber||!birthForm.birthWeight||!birthForm.eweNumber){alert('Tag #, weight, and ewe # required');return;}
    await saveLamb({id:uid(),...birthForm,birthWeight:parseFloat(birthForm.birthWeight),dateAdded:new Date().toISOString()});
    setBirth(emptyBirth);
  };

  const submitDisp = async e => {
    e.preventDefault();
    if(!dispForm.tagNumber||!dispForm.whatHappened){alert('Tag # and what happened required');return;}
    const isDied=dispForm.whatHappened==='Died', isSold=dispForm.whatHappened.startsWith('Sold');
    if(isDied&&!dispForm.cause){alert('Cause of death required');return;}
    if(isSold&&!dispForm.buyer){alert('Buyer required');return;}
    await saveDisp({id:uid(),...dispForm,type:isDied?'died':'sold',weight:dispForm.weight?parseFloat(dispForm.weight):null,dateRecorded:new Date().toISOString()});
    setDisp(emptyDisp);
  };

  const submitFeed = async e => {
    e.preventDefault();
    if(!feedForm.whatIsIt||!feedForm.quantity){alert('Feed type and quantity required');return;}
    await saveFeedRec({id:uid(),...feedForm,recorded:new Date().toISOString()});
    setFeed(emptyFeed);
  };

  const applyRetag = async ({ oldTag, newTag, newTag2, reason, animalId }) => {
    // Update lamb record
    const lamb = lambs.find(l=>l.id===animalId);
    if(lamb){
      const history=[...(lamb.retagHistory||[]),{oldTag,newTag,date:today(),reason}];
      const updated={...lamb,tagNumber:newTag,tag2:newTag2||lamb.tag2||'',retagHistory:history};
      await saveLamb(updated);
    }
    // Update meds + disposals with old tag
    await Promise.all([
      ...medEvents.filter(m=>String(m.tagNumber).toLowerCase()===oldTag.toLowerCase()).map(m=>saveMed({...m,tagNumber:newTag})),
      ...disposals.filter(d=>String(d.tagNumber).toLowerCase()===oldTag.toLowerCase()).map(d=>saveDisp({...d,tagNumber:newTag})),
    ]);
    await saveRetag({id:uid(),oldTag,newTag,newTag2,reason,date:today(),recorded:new Date().toISOString()});
  };

  // ── CSV Export ──
  const csvRow = arr => arr.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',');
  const dlCSV = (rows,name) => { const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.join('\n')); a.download=name; a.style.visibility='hidden'; document.body.appendChild(a); a.click(); document.body.removeChild(a); };

  const doExport = key => {
    if(key==='all'){
      const parts=[];
      parts.push('BARKA SHEEP TRACKER EXPORT — '+today(),'');
      parts.push('--- BIRTHS ---');
      parts.push(csvRow(['Tag #','Alt Tag','Birth Date','Sex','Birth Weight','Ewe #','Number Born','Complications','Comments']));
      lambs.forEach(l=>parts.push(csvRow([l.tagNumber,l.tag2||'',fmtDate(l.birthDate),l.sex,l.birthWeight,l.eweNumber,l.numberBorn,l.complications||'',l.comments||''])));
      parts.push('','--- DEATHS/SALES ---');
      parts.push(csvRow(['Tag #','Date','What Happened','Cause','Buyer','Weight','Comments']));
      disposals.forEach(d=>parts.push(csvRow([d.tagNumber,d.date,d.whatHappened||'',d.cause||'',d.buyer||'',d.weight||'',d.comments||''])));
      parts.push('','--- MEDICATIONS ---');
      parts.push(csvRow(['Tag #','Date','Product','Dosage','Unit','Comment']));
      medEvents.forEach(m=>parts.push(csvRow([m.tagNumber,m.date,m.product,m.dosage||'',m.unit||'',m.comment||''])));
      parts.push('','--- FEED ---');
      parts.push(csvRow(['Date','Who','What','Quantity','Unit','Comments']));
      feedLogs.forEach(f=>parts.push(csvRow([f.date,f.who,f.whatIsIt,f.quantity,f.unit,f.comments||''])));
      parts.push('','--- SALE GROUPS ---');
      parts.push(csvRow(['Name','Date','Venue','Buyer','Head','Total Wt','Avg Wt','$/lb','Total $','Avg $/Head']));
      saleGroups.forEach(g=>parts.push(csvRow([g.name,g.saleDate,g.venue,g.buyer||'',g.animals.length,(g.totalWeight||0).toFixed(1),(g.avgWeight||0).toFixed(1),(g.pricePerLb||0).toFixed(4),(g.totalPrice||0).toFixed(2),(g.avgPrice||0).toFixed(2)])));
      parts.push('','--- BREEDING GROUPS ---');
      parts.push(csvRow(['Name','Ram Tag','Ram Name','Ram Breed','Ram In','Ram Out','Ewes','Notes']));
      breedingGroups.forEach(g=>parts.push(csvRow([g.name,g.ramTag||'',g.ramName||'',g.ramBreed||'',fmtDate(g.ramInDate),g.ramOutDate?fmtDate(g.ramOutDate):'still in',g.ewes.join('; '),g.notes||''])));
      parts.push('','--- CIDR EVENTS ---');
      parts.push(csvRow(['Date In','Date Out','Ewes','Notes']));
      cidrEvents.forEach(e=>parts.push(csvRow([fmtDate(e.dateIn),e.dateOut?fmtDate(e.dateOut):'not yet',e.ewes.join('; '),e.notes||''])));
      parts.push('','--- RE-TAG LOG ---');
      parts.push(csvRow(['Date','Old Tag','New Tag','Alt Tag','Reason']));
      retagLog.forEach(r=>parts.push(csvRow([r.date,r.oldTag,r.newTag,r.newTag2||'',r.reason||''])));
      dlCSV(parts,`barka-full-export-${today()}.csv`);
      return;
    }
    const map = {
      births: { data:lambs, hdr:['Tag #','Alt Tag','Birth Date','Sex','Birth Weight','Ewe #','Number Born','Complications','Comments'], row:l=>[l.tagNumber,l.tag2||'',fmtDate(l.birthDate),l.sex,l.birthWeight,l.eweNumber,l.numberBorn,l.complications||'',l.comments||''] },
      disposals: { data:disposals, hdr:['Tag #','Date','What Happened','Cause','Buyer','Weight','Comments'], row:d=>[d.tagNumber,d.date,d.whatHappened||'',d.cause||'',d.buyer||'',d.weight||'',d.comments||''] },
      meds: { data:medEvents, hdr:['Tag #','Date','Product','Dosage','Unit','Comment'], row:m=>[m.tagNumber,m.date,m.product,m.dosage||'',m.unit||'',m.comment||''] },
      feed: { data:feedLogs, hdr:['Date','Who','What','Quantity','Unit','Comments'], row:f=>[f.date,f.who,f.whatIsIt,f.quantity,f.unit,f.comments||''] },
      saleGroups: { data:saleGroups, hdr:['Name','Date','Venue','Buyer','Head','Total Wt','Avg Wt','$/lb','Total $','Avg $/Head','Animals'], row:g=>[g.name,g.saleDate,g.venue,g.buyer||'',g.animals.length,(g.totalWeight||0).toFixed(1),(g.avgWeight||0).toFixed(1),(g.pricePerLb||0).toFixed(4),(g.totalPrice||0).toFixed(2),(g.avgPrice||0).toFixed(2),g.animals.map(a=>a.tagNumber).join('; ')] },
      breedingGroups: { data:breedingGroups, hdr:['Name','Ram Tag','Ram Name','Ram Breed','Ram In','Ram Out','Ewes','Notes'], row:g=>[g.name,g.ramTag||'',g.ramName||'',g.ramBreed||'',fmtDate(g.ramInDate),g.ramOutDate?fmtDate(g.ramOutDate):'still in',g.ewes.join('; '),g.notes||''] },
      cidrEvents: { data:cidrEvents, hdr:['Date In','Date Out','Ewes','Notes'], row:e=>[fmtDate(e.dateIn),e.dateOut?fmtDate(e.dateOut):'not yet',e.ewes.join('; '),e.notes||''] },
      retagLog: { data:retagLog, hdr:['Date','Old Tag','New Tag','Alt Tag','Reason'], row:r=>[r.date,r.oldTag,r.newTag,r.newTag2||'',r.reason||''] },
    };
    const def=map[key]; if(!def) return;
    dlCSV([csvRow(def.hdr),...def.data.map(r=>csvRow(def.row(r)))],`barka-${key}-${today()}.csv`);
  };

  const filterTag = arr => arr.filter(r=>{ const s=search.toLowerCase(); return !search||String(r.tagNumber||'').toLowerCase().includes(s)||String(r.eweNumber||'').toLowerCase().includes(s)||String(r.tag2||'').toLowerCase().includes(s); });
  const lambStats = { total:lambs.length, rams:lambs.filter(l=>l.sex==='male'||l.sex==='ram').length, ewes:lambs.filter(l=>l.sex==='female'||l.sex==='ewe').length, avg:lambs.length?(lambs.reduce((s,l)=>s+(+l.birthWeight||0),0)/lambs.length).toFixed(1):0 };

  if(loading) return <div className="loading"><div className="loading-text">Loading from Supabase...</div></div>;
  if(loadErr) return <div className="loading"><div style={{textAlign:'center',maxWidth:500,padding:'2rem'}}><div style={{color:'#dc2626',fontWeight:600,marginBottom:'.875rem'}}>Connection Error</div><div style={{color:'#4b5563',fontSize:'.875rem',marginBottom:'1rem'}}>{loadErr}</div><button className="btn btn-primary" onClick={loadAll}><Refresh/> Retry</button></div></div>;

  return (
    <div className="app-container">
      {medModal!==null&&<MedModal tag={medModal} onClose={()=>setMedModal(null)} onSave={async e=>{await saveMed(e);setMedModal(null);}}/>}
      {retagModal!==null&&<RetagModal tag={retagModal} lambs={lambs} onClose={()=>setRetagModal(null)} onSave={applyRetag}/>}

      <div className="max-w">
        <div className="card">
          <div className="header-flex">
            <div>
              <div className="title">Barka Sheep Tracker</div>
              <div className="subtitle">Powered by Supabase · jrbarka</div>
            </div>
            <div className="cloud-badge">
              <div className="cloud-title">☁️ Supabase Database</div>
              <div className="cloud-text">All data saves instantly to the cloud</div>
              <div className="sync-row"><div className="dot"/><span className="sync-text">Live sync — no manual sync needed</span></div>
              <button className="btn btn-cloud" style={{marginTop:'.5rem',width:'100%'}} onClick={loadAll}><Refresh/> Refresh data</button>
            </div>
          </div>

          {saveStatus&&<div className="alert success" style={{marginTop:'.875rem'}}>{saveStatus}</div>}

          <div className="tabs">
            {[['birth','🐑 Births'],['disposal','💀 Deaths/Sales'],['meds','💉 Meds'],['feed','🌿 Feed'],['breeding','❤️ Breeding'],['sale','💰 Sale Groups'],['export','📤 Export'],['retag','🏷️ Re-tag']].map(([id,label])=>(
              <button key={id} className={`tab ${activeTab===id?'active':''}`} onClick={()=>{setActiveTab(id);setSearch('');}}>{label}</button>
            ))}
          </div>

          <EIDBar lambs={lambs} disposals={disposals} medEvents={medEvents}
            onPrefill={(form,tag)=>{ if(form==='birth'){setActiveTab('birth');setPrefillBirth(tag);} if(form==='disposal'){setActiveTab('disposal');setPrefillDisposal(tag);} }}
            onMedModal={tag=>setMedModal(tag)} onRetagModal={tag=>setRetagModal(tag)}/>

          {activeTab==='birth'&&(
            <div className="stats-grid">
              <div className="stat green"><div className="stat-val green">{lambStats.total}</div><div className="stat-label">Total lambs</div></div>
              <div className="stat blue"><div className="stat-val blue">{lambStats.rams}</div><div className="stat-label">Ram lambs</div></div>
              <div className="stat pink"><div className="stat-val pink">{lambStats.ewes}</div><div className="stat-label">Ewe lambs</div></div>
              <div className="stat amber"><div className="stat-val amber">{lambStats.avg}</div><div className="stat-label">Avg wt (lbs)</div></div>
            </div>
          )}
        </div>

        {/* ── BIRTH TAB ── */}
        {activeTab==='birth'&&(
          <>
            <div className="card">
              <div className="section-head"><Plus/> Add New Lamb</div>
              <form onSubmit={submitBirth} className="form-grid">
                <div className="form-group"><label className="form-label">Lamb Tag # *</label><input className={`form-input mono ${birthForm.tagNumber?'prefilled':''}`} value={birthForm.tagNumber} onChange={e=>setBirth({...birthForm,tagNumber:e.target.value})} placeholder="Scan EID or type tag #" required autoComplete="off"/><p className="form-hint">Auto-filled from EID scan above</p></div>
                <div className="form-group"><label className="form-label">Alt / backup tag</label><input className="form-input mono" value={birthForm.tag2} onChange={e=>setBirth({...birthForm,tag2:e.target.value})} placeholder="Optional 2nd tag" autoComplete="off"/></div>
                <div className="form-group"><label className="form-label">Birth Date *</label><input type="date" className="form-input" value={birthForm.birthDate} onChange={e=>setBirth({...birthForm,birthDate:e.target.value})} required/></div>
                <div className="form-group"><label className="form-label">Sex *</label><select className="form-select" value={birthForm.sex} onChange={e=>setBirth({...birthForm,sex:e.target.value})}><option value="male">Male</option><option value="female">Female</option></select></div>
                <div className="form-group"><label className="form-label">Birth Weight (lbs) *</label><input type="number" step="0.1" className="form-input" value={birthForm.birthWeight} onChange={e=>setBirth({...birthForm,birthWeight:e.target.value})} placeholder="e.g., 8.5" required/></div>
                <div className="form-group"><label className="form-label">Ewe Number *</label><input className="form-input mono" value={birthForm.eweNumber} onChange={e=>setBirth({...birthForm,eweNumber:e.target.value})} placeholder="Dam's tag #" required autoComplete="off"/></div>
                <div className="form-group"><label className="form-label">Multiples</label><select className="form-select" value={birthForm.numberBorn} onChange={e=>setBirth({...birthForm,numberBorn:e.target.value})}><option value="single">Single</option><option value="twin">Twin</option><option value="triple">Triple</option><option value="quad">Quad</option><option value="other">Other</option></select></div>
                <div className="form-group"><label className="form-label">Complications</label><input className="form-input" value={birthForm.complications} onChange={e=>setBirth({...birthForm,complications:e.target.value})} placeholder="e.g., assisted, weak"/></div>
                <div className="form-group col3"><label className="form-label">Comments</label><textarea className="form-textarea" rows="2" value={birthForm.comments} onChange={e=>setBirth({...birthForm,comments:e.target.value})} placeholder="e.g., bottle fed, rejected..."/></div>
                <div className="col3" style={{display:'flex',gap:'.75rem',flexWrap:'wrap'}}>
                  <button type="submit" className="btn btn-primary"><Plus/> Add Lamb</button>
                  <button type="button" className="btn btn-outline" onClick={()=>setBirth(emptyBirth)}>Clear</button>
                </div>
              </form>
            </div>
            <div className="card">
              <div className="toolbar">
                <div style={{fontWeight:600,color:'#1f2937'}}>Lamb Records ({filterTag(lambs).length})</div>
                <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap',alignItems:'center'}}>
                  <button className="btn btn-blue btn-sm" onClick={()=>doExport('births')} disabled={!lambs.length}><DL/> CSV</button>
                  <div className="search-wrap"><div className="search-ico"><SearchIco/></div><input className="search-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tag or ewe..."/></div>
                </div>
              </div>
              {filterTag(lambs).length===0?<div className="empty">{lambs.length?'No matches.':'No lambs yet.'}</div>:(
                <div className="tbl-wrap">
                  <table>
                    <thead><tr><th>Tag #</th><th>Alt</th><th>Date</th><th>Sex</th><th>Wt</th><th>Ewe</th><th>Born as</th><th>Notes</th><th></th></tr></thead>
                    <tbody>
                      {filterTag(lambs).map(l=>(
                        <tr key={l.id}>
                          <td className="mono" style={{fontWeight:500}}>{l.tagNumber}{l.retagHistory?.length>0&&<span className="badge retagged" style={{marginLeft:4}}>re-tagged</span>}</td>
                          <td className="mono" style={{color:'#6b7280'}}>{l.tag2||'—'}</td>
                          <td>{fmtDate(l.birthDate)}</td>
                          <td><span className={`badge ${l.sex==='male'||l.sex==='ram'?'male':'female'}`}>{l.sex}</span></td>
                          <td>{l.birthWeight} lbs</td>
                          <td className="mono">{l.eweNumber}</td>
                          <td style={{textTransform:'capitalize'}}>{l.numberBorn}</td>
                          <td className="truncate" title={[l.complications,l.comments].filter(Boolean).join(' | ')}>{[l.complications,l.comments].filter(Boolean).join(' | ')||'—'}</td>
                          <td style={{display:'flex',gap:2}}>
                            <button className="btn-icon amber" title="Add med" onClick={()=>setMedModal(l.tagNumber)}><SyringeIco/></button>
                            <button className="btn-icon blue" title="Re-tag" onClick={()=>setRetagModal(l.tagNumber)}><TagIco/></button>
                            <button className="btn-icon" title="Delete" onClick={()=>{if(confirm('Delete?'))delLamb(l.id);}}><Trash/></button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </>
        )}

        {/* ── DISPOSAL TAB ── */}
        {activeTab==='disposal'&&(
          <>
            <div className="card">
              <div className="section-head"><Plus/> Record Death or Sale</div>
              <form onSubmit={submitDisp} className="form-grid">
                <div className="form-group"><label className="form-label">Tag # *</label><input className={`form-input mono ${dispForm.tagNumber?'prefilled':''}`} value={dispForm.tagNumber} onChange={e=>setDisp({...dispForm,tagNumber:e.target.value})} placeholder="Scan EID or type tag #" required autoComplete="off"/><p className="form-hint">Auto-filled from EID scan above</p></div>
                <div className="form-group"><label className="form-label">Date *</label><input type="date" className="form-input" value={dispForm.date} onChange={e=>setDisp({...dispForm,date:e.target.value})} required/></div>
                <div className="form-group"><label className="form-label">What Happened *</label><select className="form-select" value={dispForm.whatHappened} onChange={e=>setDisp({...dispForm,whatHappened:e.target.value})} required><option value="">Select...</option><option value="Sold - sale barn">Sold - sale barn</option><option value="Sold - private sale">Sold - private sale</option><option value="Died">Died</option><option value="Other">Other</option></select></div>
                {dispForm.whatHappened==='Died'&&<div className="form-group col3"><label className="form-label">Cause of Death *</label><input className="form-input" value={dispForm.cause} onChange={e=>setDisp({...dispForm,cause:e.target.value})} placeholder="e.g., illness, predator" required/></div>}
                {dispForm.whatHappened.startsWith('Sold')&&<><div className="form-group"><label className="form-label">Weight (lbs)</label><input type="number" step="0.1" className="form-input" value={dispForm.weight} onChange={e=>setDisp({...dispForm,weight:e.target.value})} placeholder="e.g., 85"/></div><div className="form-group col2"><label className="form-label">Buyer *</label><input className="form-input" value={dispForm.buyer} onChange={e=>setDisp({...dispForm,buyer:e.target.value})} placeholder="Buyer name or market" required/></div></>}
                <div className="form-group col3"><label className="form-label">Comments</label><textarea className="form-textarea" rows="2" value={dispForm.comments} onChange={e=>setDisp({...dispForm,comments:e.target.value})}/></div>
                <div className="col3" style={{display:'flex',gap:'.75rem',flexWrap:'wrap'}}>
                  <button type="submit" className="btn btn-primary"><Plus/> Add Record</button>
                  <button type="button" className="btn btn-outline" onClick={()=>setDisp(emptyDisp)}>Clear</button>
                </div>
              </form>
            </div>
            <div className="card">
              <div className="toolbar">
                <div style={{fontWeight:600,color:'#1f2937'}}>Disposal Records ({disposals.length})</div>
                <div className="search-wrap"><div className="search-ico"><SearchIco/></div><input className="search-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tag..."/></div>
              </div>
              {disposals.filter(d=>!search||String(d.tagNumber).toLowerCase().includes(search.toLowerCase())).length===0?<div className="empty">No disposal records yet.</div>:(
                <div className="tbl-wrap">
                  <table>
                    <thead><tr><th>Tag #</th><th>Date</th><th>What Happened</th><th>Cause / Buyer</th><th>Weight</th><th>Comments</th><th></th></tr></thead>
                    <tbody>
                      {disposals.filter(d=>!search||String(d.tagNumber).toLowerCase().includes(search.toLowerCase())).map(d=>(
                        <tr key={d.id}>
                          <td className="mono" style={{fontWeight:500}}>{d.tagNumber}</td>
                          <td>{fmtDate(d.date)}</td>
                          <td><span className={`badge ${d.type==='died'?'died':'sold'}`}>{d.whatHappened||d.type}</span></td>
                          <td>{d.type==='died'?d.cause:(d.buyer||'—')}</td>
                          <td>{d.weight?`${d.weight} lbs`:'—'}</td>
                          <td className="truncate">{d.comments||'—'}</td>
                          <td><button className="btn-icon" onClick={()=>{if(confirm('Delete?'))delDisp(d.id);}}><Trash/></button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </>
        )}

        {/* ── MEDS TAB ── */}
        {activeTab==='meds'&&(
          <>
            <div className="card">
              <div className="section-head"><SyringeIco/> Medication Records</div>
              <div style={{display:'flex',gap:'.75rem',flexWrap:'wrap'}}>
                <button className="btn btn-primary" onClick={()=>setMedModal('')}><Plus/> New medication entry</button>
                <button className="btn btn-blue btn-sm" onClick={()=>doExport('meds')} disabled={!medEvents.length}><DL/> Export CSV</button>
              </div>
              <p className="form-hint" style={{marginTop:'.5rem'}}>Also accessible from EID scanner and the 💉 button in Birth Records</p>
            </div>
            <div className="card">
              <div className="toolbar">
                <div style={{fontWeight:600,color:'#1f2937'}}>Medication Records ({medEvents.length})</div>
                <div className="search-wrap"><div className="search-ico"><SearchIco/></div><input className="search-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tag or product..."/></div>
              </div>
              {medEvents.filter(m=>!search||String(m.tagNumber).toLowerCase().includes(search.toLowerCase())||String(m.product).toLowerCase().includes(search.toLowerCase())).length===0?<div className="empty">No medication records yet.</div>:(
                <div className="tbl-wrap">
                  <table>
                    <thead><tr><th>Tag #</th><th>Date</th><th>Product</th><th>Dosage</th><th>Unit</th><th>Comment</th><th></th></tr></thead>
                    <tbody>
                      {[...medEvents].sort((a,b)=>b.date.localeCompare(a.date)).filter(m=>!search||String(m.tagNumber).toLowerCase().includes(search.toLowerCase())||String(m.product).toLowerCase().includes(search.toLowerCase())).map(m=>(
                        <tr key={m.id}>
                          <td className="mono" style={{fontWeight:500}}>{m.tagNumber}</td>
                          <td>{fmtDate(m.date)}</td>
                          <td style={{fontWeight:500}}>{m.product}</td>
                          <td>{m.dosage||'—'}</td>
                          <td>{m.unit||'—'}</td>
                          <td className="truncate">{m.comment||'—'}</td>
                          <td><button className="btn-icon" onClick={()=>{if(confirm('Delete?'))delMed(m.id);}}><Trash/></button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </>
        )}

        {/* ── FEED TAB ── */}
        {activeTab==='feed'&&(
          <>
            <div className="card">
              <div className="section-head"><LeafIco/> Log Feed / Supply</div>
              <form onSubmit={submitFeed} className="form-grid">
                <div className="form-group"><label className="form-label">Date</label><input type="date" className="form-input" value={feedForm.date} onChange={e=>setFeed({...feedForm,date:e.target.value})}/></div>
                <div className="form-group"><label className="form-label">Who</label><select className="form-select" value={feedForm.who} onChange={e=>setFeed({...feedForm,who:e.target.value})}>{FEED_WHO.map(w=><option key={w} value={w}>{w}</option>)}</select></div>
                <div className="form-group"><label className="form-label">What is it *</label><select className="form-select" value={feedForm.whatIsIt} onChange={e=>setFeed({...feedForm,whatIsIt:e.target.value})} required><option value="">Select...</option>{FEED_ITEMS.map(f=><option key={f} value={f}>{f}</option>)}</select></div>
                <div className="form-group"><label className="form-label">Quantity *</label><input type="number" step="any" className="form-input" value={feedForm.quantity} onChange={e=>setFeed({...feedForm,quantity:e.target.value})} placeholder="Amount" required/></div>
                <div className="form-group"><label className="form-label">Unit</label><select className="form-select" value={feedForm.unit} onChange={e=>setFeed({...feedForm,unit:e.target.value})}>{FEED_UNITS.map(u=><option key={u} value={u}>{u}</option>)}</select></div>
                <div className="form-group col3"><label className="form-label">Comments</label><input className="form-input" value={feedForm.comments} onChange={e=>setFeed({...feedForm,comments:e.target.value})}/></div>
                <div className="col3" style={{display:'flex',gap:'.75rem',flexWrap:'wrap'}}>
                  <button type="submit" className="btn btn-primary"><Plus/> Log Feed</button>
                  <button type="button" className="btn btn-outline" onClick={()=>setFeed(emptyFeed)}>Clear</button>
                </div>
              </form>
            </div>
            <div className="card">
              <div style={{fontWeight:600,color:'#1f2937',marginBottom:'.875rem'}}>Feed Log ({feedLogs.length})</div>
              {feedLogs.length===0?<div className="empty">No feed records yet.</div>:(
                <div className="tbl-wrap">
                  <table>
                    <thead><tr><th>Date</th><th>Who</th><th>Feed</th><th>Qty</th><th>Unit</th><th>Comments</th><th></th></tr></thead>
                    <tbody>
                      {feedLogs.map(f=>(
                        <tr key={f.id}>
                          <td>{fmtDate(f.date)}</td><td>{f.who}</td><td style={{fontWeight:500}}>{f.whatIsIt}</td><td>{f.quantity}</td><td>{f.unit}</td>
                          <td className="truncate">{f.comments||'—'}</td>
                          <td><button className="btn-icon" onClick={()=>{if(confirm('Delete?'))delFeed(f.id);}}><Trash/></button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </>
        )}

        {/* ── BREEDING TAB ── */}
        {activeTab==='breeding'&&(
          <BreedingTab lambs={lambs} breedingGroups={breedingGroups} cidrEvents={cidrEvents}
            onSaveGroup={saveBreedGrp} onDeleteGroup={delBreedGrp}
            onSaveCidr={saveCidr} onDeleteCidr={delCidr}/>
        )}

        {/* ── SALE GROUPS TAB ── */}
        {activeTab==='sale'&&(
          <SaleGroupTab lambs={lambs} saleGroups={saleGroups} onSave={saveSaleGrp} onDelete={delSaleGrp}/>
        )}

        {/* ── EXPORT TAB ── */}
        {activeTab==='export'&&(
          <ExportTab
            counts={{births:lambs.length,disposals:disposals.length,meds:medEvents.length,feed:feedLogs.length,saleGroups:saleGroups.length,breedingGroups:breedingGroups.length,cidrEvents:cidrEvents.length,retagLog:retagLog.length}}
            onExport={doExport}/>
        )}

        {/* ── RETAG TAB ── */}
        {activeTab==='retag'&&(
          <RetagTab lambs={lambs} retagLog={retagLog} onRetag={tag=>setRetagModal(tag)}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
